/* PR0CESS // QUEUE — styles v2 "PRISM" (art direction: glitch chroma ref) */
:root{
  --void:#040609;         /* blue-black */
  --panel:#0A111B;
  --panel-2:#0F1826;
  --line:#182A3F;
  --text:#E6F0FA;         /* cool white */
  --dim:#6E8299;
  --dimmer:#3D4C60;
  --electric:#3FC6FF;     /* SIGNATURE: electric cyan */
  --electric-soft:#0A2434;
  --hot:#FF2E5F;          /* armed / live / hot state */
  --hot-soft:#2B0A16;
  --prism:linear-gradient(90deg,#FF2E5F,#FF7A2E,#3FC6FF 55%,#7A5CFF,#FF2E88);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--void);color:var(--text);
  font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;letter-spacing:.01em;position:relative}
/* scan lines over everything, very low key */
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.14) 2px 3px)}
body.overlay::after{background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.10) 2px 3px)}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
.wrap{max-width:760px;margin:0 auto;padding:24px 18px 80px}
.amber{color:var(--electric)} .bad{color:var(--hot)} .good{color:var(--electric)}

/* masthead with prism rule + RGB-split wordmark */
.mast{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding-bottom:14px;margin-bottom:22px;position:relative}
.mast::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
  background:var(--prism);opacity:.85}
.brand{font-weight:800;font-size:15px;letter-spacing:.14em;text-transform:uppercase;
  text-shadow:-1.5px 0 rgba(255,46,95,.65), 1.5px 0 rgba(63,198,255,.65)}
.brand .z{color:var(--electric)}
.brand small{display:block;font-weight:400;font-size:10px;letter-spacing:.34em;color:var(--dim);
  margin-top:3px;text-shadow:none}
.statuspill{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  padding:5px 10px;border:1px solid var(--line);border-radius:2px;white-space:nowrap}
.statuspill.open{color:var(--electric);border-color:#14506b;text-shadow:0 0 8px rgba(63,198,255,.5)}
.statuspill.open::before{content:"● "}
.statuspill.closed{color:var(--hot);border-color:#5a1428;text-shadow:0 0 8px rgba(255,46,95,.5)}
.statuspill.closed::before{content:"● "}

.modenav{display:flex;gap:2px;margin-bottom:20px}
.modenav a{flex:1;text-align:center;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);padding:9px 4px;border:1px solid var(--line);border-radius:2px;text-decoration:none}
.modenav a.on{color:var(--void);background:var(--electric);border-color:var(--electric);font-weight:700;
  box-shadow:0 0 14px rgba(63,198,255,.35)}

.field{margin-bottom:14px}
.field label{display:block;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--dim);margin-bottom:6px}
.field label .req{color:var(--electric)}
input[type=text],input[type=url],input[type=password],textarea{
  width:100%;background:var(--panel);border:1px solid var(--line);border-radius:2px;
  color:var(--text);padding:11px 12px;font-size:13.5px}
textarea{resize:vertical;min-height:64px;line-height:1.55}
input::placeholder,textarea::placeholder{color:var(--dimmer)}
input:focus,textarea:focus{outline:none;border-color:var(--electric);
  box-shadow:0 0 0 1px var(--electric),0 0 14px rgba(63,198,255,.25)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:7px 11px;
  border:1px solid var(--line);border-radius:2px;color:var(--dim);background:var(--panel)}
.chip.on{color:var(--electric);border-color:#14506b;background:var(--electric-soft);
  box-shadow:0 0 10px rgba(63,198,255,.2)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--electric);color:var(--void);font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  font-size:13px;padding:14px;border-radius:2px;margin-top:6px;box-shadow:0 0 18px rgba(63,198,255,.3)}
.btn:active{transform:translateY(1px)}
.btn:disabled{background:var(--dimmer);color:#0d1622;cursor:not-allowed;box-shadow:none}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--dim);font-weight:700;box-shadow:none}
.btn.ghost:hover{color:var(--text);border-color:var(--dim)}

.hint{font-size:11px;color:var(--dim);line-height:1.6;margin-top:14px}
.hint b{color:var(--text);font-weight:500}

.rack{display:flex;flex-direction:column;gap:8px}
.strip{display:flex;align-items:stretch;background:var(--panel);border:1px solid var(--line);
  border-radius:3px;overflow:hidden}
.strip .num{flex:0 0 42px;display:flex;align-items:center;justify-content:center;font-weight:800;
  font-size:15px;color:var(--dim);background:var(--panel-2);border-right:1px solid var(--line)}
.strip .body{flex:1;min-width:0;padding:11px 13px}
.strip .who{font-weight:700;font-size:14px}
.strip .title{font-size:12.5px;color:var(--text);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strip .meta{font-size:10.5px;color:var(--dim);margin-top:5px;letter-spacing:.04em;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.strip .meta .tag{color:var(--electric);text-transform:uppercase;letter-spacing:.1em}
.strip .meta a{color:var(--electric);text-decoration:none}
.strip .note{font-size:11.5px;color:var(--dim);margin-top:7px;line-height:1.5;
  padding-top:7px;border-top:1px dashed var(--line)}
.strip .acts{flex:0 0 auto;display:flex;flex-direction:column;border-left:1px solid var(--line)}
.strip .acts button{flex:1;padding:0 13px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--dim);border-bottom:1px solid var(--line);min-width:78px}
.strip .acts button:last-child{border-bottom:none}
.strip .acts button:hover{color:var(--text);background:var(--panel-2)}
.strip .acts button.go:hover{color:var(--electric)}
.strip .acts button.kill:hover{color:var(--hot)}
.skiptag{color:var(--hot);font-size:10px;letter-spacing:.1em}

/* ARMED = the hot state, like the reference's red-hot cores */
.strip.live{border-color:var(--hot);background:var(--hot-soft);
  box-shadow:0 0 22px rgba(255,46,95,.18)}
.strip.live .num{background:var(--hot);color:var(--void)}
.strip.live .who{color:var(--hot);text-shadow:0 0 10px rgba(255,46,95,.5)}
.meter{height:4px;background:var(--line);border-radius:2px;margin-top:9px;overflow:hidden}
.meter i{display:block;height:100%;width:60%;background:var(--prism);
  animation:vu 1.1s ease-in-out infinite alternate}
@keyframes vu{from{width:22%}to{width:92%}}
@media (prefers-reduced-motion:reduce){
  .meter i,.ovl .mtr i{animation:none;width:70%}
  .ovl .now .h{animation:none}
}

.seclabel{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);
  margin:26px 0 11px;display:flex;align-items:center;gap:10px}
.seclabel::after{content:"";flex:1;height:1px;background:var(--line)}
.seclabel .ct{color:var(--electric)}

.dashbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
.dashbar .spacer{flex:1}
.toggle{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--dim);border:1px solid var(--line);border-radius:2px;padding:8px 11px}
.toggle b{font-weight:700}
.miniact{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);
  border:1px solid var(--line);border-radius:2px;padding:8px 11px}
.miniact:hover{color:var(--text);border-color:var(--dim)}
.miniact.danger:hover{color:var(--hot);border-color:#5a1428}

.empty{border:1px dashed var(--line);border-radius:3px;padding:30px 18px;text-align:center;
  color:var(--dim);font-size:12.5px;line-height:1.7}
.empty b{color:var(--text);font-weight:500;display:block;margin-bottom:4px;letter-spacing:.04em}
.confirm{border:1px solid var(--electric);background:var(--electric-soft);border-radius:3px;
  padding:22px;text-align:center;box-shadow:0 0 26px rgba(63,198,255,.15)}
.confirm .big{font-weight:800;font-size:22px;letter-spacing:.06em;color:var(--electric);
  text-shadow:-1.5px 0 rgba(255,46,95,.55),1.5px 0 rgba(63,198,255,.55)}
.confirm .sub{font-size:12px;color:var(--text);margin-top:8px;line-height:1.6}
.confirm .pos{font-size:48px;font-weight:800;color:var(--electric);line-height:1;margin:14px 0 6px;
  text-shadow:-2px 0 rgba(255,46,95,.6),2px 0 rgba(63,198,255,.6)}

/* ---- OVERLAY: full send ---- */
body.overlay{background:transparent}
.ovl{padding:26px}
.ovl .lab{font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:var(--electric);
  text-shadow:0 0 14px rgba(63,198,255,.7)}
.ovl .now{font-weight:800;font-size:36px;color:#fff;margin-top:6px;
  text-shadow:0 2px 18px rgba(0,0,0,.9)}
.ovl .now .h{color:#fff;display:inline-block;
  text-shadow:-3px 0 rgba(255,46,95,.9),3px 0 rgba(63,198,255,.9),0 2px 18px rgba(0,0,0,.9);
  animation:chroma 6s steps(1) infinite}
@keyframes chroma{
  0%,92%{transform:translateX(0)}
  93%{transform:translateX(-2px)}
  94%{transform:translateX(2px)}
  95%,100%{transform:translateX(0)}
}
.ovl .trk{font-size:18px;color:#fff;margin-top:4px;opacity:.92;text-shadow:0 2px 14px rgba(0,0,0,.9)}
.ovl .mtr{height:6px;width:340px;max-width:80vw;background:rgba(255,255,255,.12);
  border-radius:3px;margin-top:16px;overflow:hidden}
.ovl .mtr i{display:block;height:100%;width:70%;background:var(--prism);
  box-shadow:0 0 18px rgba(63,198,255,.7);animation:vu 1.05s ease-in-out infinite alternate}
.ovl .next{margin-top:18px;font-size:14px;letter-spacing:.06em;color:#fff;opacity:.85;
  text-shadow:0 2px 12px rgba(0,0,0,.9)}
.ovl .next b{color:var(--electric);font-weight:700}

.gate{max-width:420px;margin:60px auto;text-align:center}
.gate .g-brand{font-weight:800;font-size:18px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px;
  text-shadow:-1.5px 0 rgba(255,46,95,.65),1.5px 0 rgba(63,198,255,.65)}
.gate .g-brand .z{color:var(--electric)}
.gate p{color:var(--dim);font-size:12px;line-height:1.7;margin:10px 0 22px}
.gate .err{color:var(--hot);font-size:11.5px;margin-top:14px}

.foot{margin-top:40px;padding-top:14px;border-top:1px solid var(--line);font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

.ovl .now.closednow{color:var(--hot);
  text-shadow:-3px 0 rgba(63,198,255,.7),3px 0 rgba(255,46,95,.9),0 2px 18px rgba(0,0,0,.9)}
/* ---- beat battle: old-tool bracket structure, PRISM skin ---- */
.wrap.wide{max-width:1200px}
:root{--line2:#254058;--gold:#FFD34D;--win-bg:rgba(63,198,255,.12)}
.statuspill.live2{color:var(--electric);border-color:#14506b;text-shadow:0 0 8px rgba(63,198,255,.5)}
.statuspill.live2::before{content:"\25CF "}
.statuspill.gold{color:var(--gold);border-color:#6b5514;text-shadow:0 0 8px rgba(255,211,77,.5)}
.statuspill.gold::before{content:"\265B "}
.goldtxt{color:var(--gold)}
.btn.slim{width:auto;padding:11px 18px;margin-top:0}
code{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:2px 8px;color:var(--electric);font-size:13px}
.cmdref{background:var(--panel);border:1px solid var(--line);border-radius:3px;padding:11px 13px;font-size:12px;color:var(--dim);margin-bottom:16px;line-height:1.8}
.cmdref b{color:var(--text)}
.goldstrip{border-color:#6b5514;background:#1d1607}
.goldstrip .num{background:var(--gold);color:var(--void)}

/* ===== bracket (ported from the weekly tool) ===== */
.bscroll{overflow-x:auto;padding:20px 4px}
.bracket{display:flex;align-items:stretch;width:max-content}
.rcol{display:flex;flex-direction:column}
.rtitle{font-family:'Code','JetBrains Mono',monospace;font-size:13px;letter-spacing:3px;
  color:var(--electric);text-transform:uppercase;text-align:center;margin-bottom:16px;
  padding:0 8px;white-space:nowrap;position:relative}
.rtitle::after{content:"";display:block;width:24px;height:2px;background:var(--prism);margin:6px auto 0}
.rmatches{display:flex;flex-direction:column;flex:1}
.mwrap{display:flex;align-items:center;flex:1}

function esc(s){return (s||"").replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

/* ---------- countdown ---------- */
function fmtLeft(ms){
  if(ms<=0) return "00:00";
  var s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), x=s%60;
  function p(n){return (n<10?"0":"")+n;}
  return (h>0?h+":":"")+p(m)+":"+p(x);
}
function deadlineSet(){ return !!B.deadline; }
function timerLabel(){ return B.timer_label==='cook' ? 'COOK UP' : 'UPLOAD WINDOW'; }
function uploadExpired(){
  return deadlineSet() && B.timer_label!=='cook' && new Date(B.deadline).getTime() <= Date.now();
}
var _expFired=null;
setInterval(function(){
  if(!B.deadline){ _expFired=null; return; }
  var left=new Date(B.deadline).getTime()-Date.now();
  if(left<=0 && _expFired!==B.deadline){ _expFired=B.deadline; emit(); }
  document.querySelectorAll(".tval").forEach(function(el){ el.textContent=fmtLeft(left); });
  document.querySelectorAll(".twrap").forEach(function(el){
    el.classList.toggle("tdone", left<=0);
    el.classList.toggle("tlow", left>0&&left<=60000);

},500);

/* ---------- seeding (the proven no-double-skip algorithm) ---------- */
function pow2(n){var p=1;while(p<n)p*=2;return Math.max(p,2);}
function seedPositions(size){var a=[1];while(a.length<size){var n=a.length*2,out=[];a.forEach(function(s){out.push(s,n+1-s);});a=out;}return a;}
function buildBracket(){
  var champ=champEntrant();
  var rest=ENT.filter(function(e){return !e.is_champ;});
  // shuffle non-champs
  for(var i=rest.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=rest[i];rest[i]=rest[j];rest[j]=t;}
  var ordered=(champ?[champ]:[]).concat(rest);           // seed 1 = champ
  var count=ordered.length, size=pow2(count), R=Math.log2(size);
  var pos=seedPositions(size);
  var slots=pos.map(function(s){return s<=count?ordered[s-1].id:null;});
  var rows=[], id=1;
  var per=size/2;
  for(var r=0;r<R;r++){
    for(var x=0;x<per;x++) rows.push({id:id++,round:r,idx:x,a:"",b:"",is_bye:false,winner:""});
    per=per/2;
  }
  function row(r,x){ return rows.filter(function(m){return m.round===r&&m.idx===x;})[0]; }
  for(var x=0;x<size/2;x++){ var m=row(0,x); m.a=slots[2*x]||""; m.b=slots[2*x+1]||""; }
  // propagate byes out of round 1
  rows.filter(function(m){return m.round===0;}).forEach(function(m){
    if(m.a&&!m.b){ m.is_bye=true; m.winner="a"; place(m,m.a); }
    else if(m.b&&!m.a){ m.is_bye=true; m.winner="b"; place(m,m.b); }
  });
  function place(m,wid){
    if(m.round===R-1) return;
    var nx=row(m.round+1,Math.floor(m.idx/2));
    if(m.idx%2===0) nx.a=wid; else nx.b=wid;
  }
  return rows;
}

        else err.innerHTML='<b class="bad">Couldn\u2019t enter \u2014 try again.</b>';

/* ---------- BRACKET (public) ---------- */
function bracketHTML(interactive){
  if(!M.length) return '<div class="empty">'+(B.state==='entries'?'Bracket seeds when entries lock. '+ENT.length+' producers in so far.':'No bracket yet.')+'</div>';
  var R=Math.max.apply(null,M.map(function(m){return m.round;}))+1;
  var nextId=B.active_match;
  if(!nextId){
    var n=M.filter(function(m){return !m.winner&&m.a&&m.b;}).sort(function(a,b){return a.id-b.id;})[0];
    if(n) nextId=n.id;
  }
  var html='<div class="bscroll"><div class="bracket">';
  for(var r=0;r<R;r++){
    var ms=M.filter(function(m){return m.round===r;});
    html+='<div class="rcol"><div class="rtitle">'+roundName(r,R)+'</div><div class="rmatches">';
    ms.forEach(function(m){
      var aC=byId(m.a), bC=byId(m.b);
      var armed=B.active_match===m.id;
      var isNext=nextId===m.id&&!m.winner&&!m.is_bye;
      var hasChamp=(aC&&aC.is_champ)||(bC&&bC.is_champ);
      html+='<div class="mwrap"><div class="match'+(isNext?' next':'')+(hasChamp?' champ-match':'')+'"'+
        (interactive&&isOwner()&&!m.is_bye&&!m.winner?' data-arm="'+m.id+'"':'')+'>'+
        '<div class="m-head"><span class="m-num">M'+m.id+'</span>'+
        (armed?'<span class="m-next-tag livec">LIVE \u25B8</span>':(isNext?'<span class="m-next-tag">NEXT \u25B8</span>':''))+'</div>'+
        slot(m,'a',aC)+slot(m,'b',bC)+
      '</div></div>';
    });
    html+='</div></div>';
  }
  html+='<div class="rcol champ-col"><div class="rtitle">Champion</div><div class="rmatches"><div class="mwrap">'+
    '<div class="champ-card"><div class="clabel">Champion</div><div class="ctrophy">\u265B</div>'+
    '<div class="cname">'+(B.state==='done'&&B.champ_name?esc(B.champ_name):'\u2014')+'</div></div>'+
  '</div></div></div>';
  html+='</div></div>';
  return html;
  function slot(m,s,e){
    var win=m.winner===s, lose=m.winner&&m.winner!==s&&(s==='a'?m.a:m.b);
    var cls='slot'+(win?' win':'')+(lose?' lose':'')+(!e&&m.is_bye?' bye':'')+(!e&&!m.is_bye?' empty':'')+(e&&e.is_champ?' chs':'');
    var nm=e?esc(e.handle):(m.is_bye?'\u2014':'TBD');
    var tail='';
    if(m.is_bye&&!e){ var other=byId(s==='a'?m.b:m.a); tail='<span class="bye-tag'+((other&&other.is_champ)?' cb':'')+'">BYE</span>'; }
    else if(e&&!m.is_bye) tail='<span class="bv">'+(s==='a'?m.votes_a:m.votes_b)+'</span>';
    return '<div class="'+cls+'"><span class="dot"></span><span class="sname">'+nm+(e&&e.is_champ?' \u265B':'')+'</span>'+tail+'</div>';
  }
}

/* ---------- BOARD (host + mods) ---------- */
function renderBoard(){
  if(!PIN){ renderGate(); return; }
  app.innerHTML='<div class="wrap wide">'+mast('BOARD'+(isOwner()?'':' \u00b7 MOD'))+nav('board')+
    '<div class="dashbar" id="topbar"></div>'+
    '<div id="champrow" class="cmdref" style="display:none"></div>'+
    '<div id="zone"></div>'+
    '<div class="foot"><span>v1.0</span><span>'+(isOwner()?'HOST':'MOD')+'</span></div></div>';
  if(isOwner()){
    var el=document.getElementById("champrow");
    if(el){
      el.style.display="";
      var hasCode = B.champ_code_set===true; // set via refresh below
      sb.from("bb_battle").select("champ_code").eq("id",1).single().then(function(r){
        var isSet = !!(r.data && r.data.champ_code);
        el.innerHTML='Champ code: <b class="'+(isSet?'goldtxt':'bad')+'">'+(isSet?'SET \u2713':'NOT SET')+'</b>'+
          ' \u00b7 <input id="cc-in" type="password" placeholder="type new code" style="width:150px;padding:6px 8px;font-size:12px">'+
          ' <button class="miniact" id="cc-save">Set</button>'+
          '<span class="hint" style="margin-left:10px">code is never shown \u2014 DM the champ whatever you type here</span>';
        document.getElementById("cc-save").onclick=function(){
          var v=document.getElementById("cc-in").value.trim();
          if(!v){ alert("Type a code first."); return; }
          admin("set_champ_code",{p_text:v}).then(function(){ document.getElementById("cc-in").value=""; renderBoard(); });
        };
      });
    }
  }
  onState(function(){
    var p=document.querySelector(".statuspill"); if(p) p.outerHTML=pill();
    var tb=document.getElementById("topbar"); if(!tb) return;
    var z=document.getElementById("zone");
    if(B.state==='entries'){
      tb.innerHTML=(isOwner()?'<button class="btn slim" id="lockit"'+(ENT.length<2?' disabled':'')+'>Lock bracket & seed ('+ENT.length+')</button>':'<span class="hint">Entries open \u2014 '+ENT.length+' in. Host locks when ready.</span>')+
        (deadlineSet()?'<span class="twrap tmini">\u23F1 '+timerLabel()+' <span class="tval">--:--</span></span>':'')+
        '<span class="tgrp">COOK <button class="miniact" data-t="cook:15">+15</button><button class="miniact" data-t="cook:30">+30</button><button class="miniact" data-t="cook:60">+60</button></span>'+
        '<span class="tgrp">UPLOAD <button class="miniact" data-t="upload:5">+5</button><button class="miniact" data-t="upload:10">+10</button></span>'+
        (deadlineSet()?'<button class="miniact danger" id="tclr">Clear</button>':'')+
        '<div class="spacer"></div><button class="miniact" id="copylist">Copy list</button><button class="miniact danger" id="lockout">Lock</button>';
      tb.querySelectorAll("[data-t]").forEach(function(b){
        b.onclick=function(){
          var p=b.getAttribute("data-t").split(":");
          admin("deadline",{p_delta:parseInt(p[1],10),p_text:p[0]});
        };
      });
      var tclr=document.getElementById("tclr");
      if(tclr) tclr.onclick=function(){ admin("deadline",{p_delta:null}); };
      z.innerHTML='<div class="seclabel">Entrants <span class="ct">'+ENT.length+'</span></div><div class="rack">'+
        (ENT.length?ENT.map(function(e){
          return '<div class="strip'+(e.is_champ?' goldstrip':'')+'"><div class="num">'+(e.is_champ?'\u265b':'\u00b7')+'</div><div class="body">'+
            '<div class="who">'+esc(e.handle)+(e.is_champ?' <span class="goldtxt" style="font-size:10px;letter-spacing:.1em">CHAMP</span>':'')+'</div>'+
            '<div class="meta">'+(linkOf(e.id)?'<a href="'+esc(linkOf(e.id))+'" target="_blank" rel="noopener">open track \u2197</a>':'<span class="hint">unlocking\u2026</span>')+'</div></div>'+
            '<div class="acts"><button class="kill" data-rm="'+e.id+'">\u2715</button></div></div>';
        }).join(''):'<div class="empty">Nobody in yet \u2014 drop the entry link in chat.</div>')+'</div>';
      var lk=document.getElementById("lockit");
      if(lk) lk.onclick=function(){
        if(!confirm("Lock entries and seed the bracket for "+ENT.length+" producers?")) return;
        admin("lock",{p_matches:buildBracket()});
      };
    } else {
      tb.innerHTML=(isOwner()?'<button class="miniact" id="undoall" title="undo last decided match">Undo last</button><button class="miniact" id="unlockit">Unlock entries</button><button class="miniact danger" id="resetit">New battle (reset)</button>':'<span class="hint">Tally votes with + / \u2212. Host declares winners.</span>')+
        '<div class="spacer"></div><button class="miniact" id="copylist">Copy list</button><button class="miniact danger" id="lockout">Lock</button>';
      z.innerHTML='<div id="fight"></div><div class="seclabel">Bracket</div>'+bracketHTML(true);
      renderFight();
      var ul=document.getElementById("unlockit");
      if(ul) ul.onclick=function(){
        if(!confirm("Reopen entries? Everyone stays entered \u2014 this bracket and its votes get wiped when you lock again (fresh random pairings).")) return;
        admin("open").then(function(){ admin("arm",{p_id:null}); });
      };
      var rs=document.getElementById("resetit");
      if(rs) rs.onclick=function(){ if(confirm("Wipe this battle and open entries for next week? Champ code carries over.")) admin("reset"); };
      var ud=document.getElementById("undoall");
      if(ud) ud.onclick=function(){
        var dec=M.filter(function(m){return m.winner&&!m.is_bye;}).sort(function(a,b){return b.id-a.id;})[0];
        if(!dec){ alert("Nothing to undo."); return; }
        admin("undo_winner",{p_id:dec.id});
      };
      document.querySelectorAll("[data-arm]").forEach(function(el){
        el.onclick=function(){ admin("arm",{p_id:parseInt(el.getAttribute("data-arm"),10)}); };
      });
    }
    document.querySelectorAll("[data-rm]").forEach(function(b){ b.onclick=function(){ admin("remove_entrant",{p_uuid:b.getAttribute("data-rm")}); }; });
    var lo=document.getElementById("lockout");
    if(lo) lo.onclick=function(){ PIN=""; ROLE=""; localStorage.removeItem("pq_pin"); localStorage.removeItem("pq_role"); render(); };
    var cl=document.getElementById("copylist");
    if(cl) cl.onclick=function(){
      var rows=ENT.map(function(e){ return {handle:e.handle, link:linkOf(e.id)||"(link locked)", won:(B.state==='done'&&B.champ_name===e.handle)}; });
      copyText(discordText(rows, B.state==='done'?B.champ_name:null, new Date().toLocaleDateString()), cl);
    };
  });
  function renderFight(){
    var f=document.getElementById("fight"); if(!f) return;
    var m=M.filter(function(x){return x.id===B.active_match;})[0];
    if(!m){ f.innerHTML='<div class="empty"><b>No match armed.</b>'+(isOwner()?'Tap a match below to put it on the overlay.':'Host arms matches.')+'</div>'; return; }
    var a=byId(m.a), b=byId(m.b);
    var R=Math.max.apply(null,M.map(function(x){return x.round;}))+1;
    f.innerHTML='<div class="fstage">'+fSide(m,'a',a)+'<div class="fvs">VS</div>'+fSide(m,'b',b)+'</div>';
    function fSide(m,s,e){
      var v=s==='a'?m.votes_a:m.votes_b;
      var won=m.winner===s;
      return '<div class="fside'+(won?' won':'')+(e&&e.is_champ?' champ-side':'')+'">'+
        '<div class="fcorner">'+(e&&e.is_champ?'\u265B CHAMP':roundName(m.round,R))+'</div>'+
        '<div class="fname">'+(e?esc(e.handle):'\u2014')+'</div>'+
        (e&&linkOf(e.id)?'<a class="ftrack" href="'+esc(linkOf(e.id))+'" target="_blank" rel="noopener">play track \u2197</a>':'')+
        '<div class="fvotes">'+v+'</div>'+
        '<div class="frow">'+
          '<button class="vb" data-v="'+m.id+'" data-s="'+s+'" data-d="-1">\u2212</button>'+
          '<button class="vb" data-v="'+m.id+'" data-s="'+s+'" data-d="1">+</button>'+
          (isOwner()&&!m.winner?'<button class="wb" data-w="'+m.id+'" data-s="'+s+'">WINNER</button>':'')+
        '</div></div>';
    }
    f.querySelectorAll("[data-v]").forEach(function(b){ b.onclick=function(){ admin("vote",{p_id:parseInt(b.getAttribute("data-v"),10),p_side:b.getAttribute("data-s"),p_delta:parseInt(b.getAttribute("data-d"),10)}); }; });
    f.querySelectorAll("[data-w]").forEach(function(b){ b.onclick=function(){ admin("set_winner",{p_id:parseInt(b.getAttribute("data-w"),10),p_side:b.getAttribute("data-s")}); }; });
  }
}
function renderGate(){
  app.innerHTML='<div class="wrap">'+mast('BOARD')+nav('board')+'<div class="gate"><div class="g-brand">BEAT BATTLE <span class="z">//</span> BOARD</div>'+
    '<p>Same PINs as the queue \u2014 crew runs it, mods tally votes.</p>'+
    '<input id="pin" type="password" placeholder="PIN" style="text-align:center;max-width:260px;margin:0 auto;display:block">'+
    '<button class="btn" id="unlock" style="max-width:260px;margin:14px auto 0">Unlock</button>'+
    '<div class="err" id="g-err"></div></div></div>';
  function go(){
    var v=document.getElementById("pin").value.trim();
    getRole(v).then(function(role){
      if(role==="owner"||role==="mod"){PIN=v;ROLE=role;localStorage.setItem("pq_pin",v);localStorage.setItem("pq_role",role);loadLinks();render();}
      else document.getElementById("g-err").textContent="Wrong PIN.";
    });
  }
  document.getElementById("unlock").onclick=go;
  document.getElementById("pin").onkeydown=function(e){if(e.key==="Enter")go();};
}

/* ---------- ARCHIVE ---------- */
function renderArchive(){
  app.innerHTML='<div class="wrap wide">'+mast('ARCHIVE')+nav('archive')+
    '<div id="zone"><div class="empty">Loading past battles\u2026</div></div>'+
    '<div class="foot"><span>v1.0</span><span>BEAT BATTLE</span></div></div>';
  sb.from("bb_archive").select("*").order("battle_ts",{ascending:false}).order("won",{ascending:false}).order("handle")
  .then(function(r){
    var z=document.getElementById("zone"); if(!z) return;
    if(r.error||!r.data||!r.data.length){
      z.innerHTML='<div class="empty"><b>No past battles yet.</b>Every battle archives itself automatically when the host resets for the next week.</div>'; return;
    }
    var groups={}; var order=[];
    r.data.forEach(function(row){
      var k=row.battle_ts;
      if(!groups[k]){groups[k]=[];order.push(k);}
      groups[k].push(row);
    });
    var html='';
    order.forEach(function(k,gi){
      var rows=groups[k];
      var d=new Date(k);
      var when=d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
      var champ=rows.filter(function(x){return x.won;})[0];
      html+='<div class="seclabel">'+when+(champ?' \u00b7 <span class="goldtxt">\u265B '+esc(champ.handle)+'</span>':'')+
        '<button class="miniact" data-cp="'+gi+'" style="margin-left:auto">Copy for Discord</button>'+
        (isOwner()?'<button class="miniact danger" data-del="'+gi+'">\u2715</button>':'')+'</div>'+
        '<div class="rack" style="margin-bottom:20px">'+
        rows.map(function(x){
          return '<div class="strip'+(x.won?' goldstrip':'')+'"><div class="num">'+(x.won?'\u265B':(x.was_champ?'\u265B':'\u00b7'))+'</div><div class="body">'+
            '<div class="who'+(x.won?' goldtxt':'')+'">'+esc(x.handle)+(x.won?' <span class="goldtxt" style="font-size:10px;letter-spacing:.1em">WON</span>':(x.was_champ?' <span style="font-size:10px;letter-spacing:.1em;color:var(--dim)">DEFENDED</span>':''))+'</div>'+
            '<div class="meta"><a href="'+esc(x.link)+'" target="_blank" rel="noopener">open track \u2197</a></div>'+
          '</div></div>';
        }).join('')+'</div>';
    });
    z.innerHTML=html;
    z.querySelectorAll("[data-del]").forEach(function(b){
      b.onclick=function(){
        var k=order[parseInt(b.getAttribute("data-del"),10)];
        var when=new Date(k).toLocaleDateString();
        if(!confirm("Delete the archived battle from "+when+"? This is permanent.")) return;
        admin("del_archive",{p_text:k}).then(function(){ renderArchive(); });
      };
    });
    z.querySelectorAll("[data-cp]").forEach(function(b){
      b.onclick=function(){
        var k=order[parseInt(b.getAttribute("data-cp"),10)];
        var rows=groups[k].map(function(x){return {handle:x.handle,link:x.link,won:x.won};});
        var champ=groups[k].filter(function(x){return x.won;})[0];
        var when=new Date(k).toLocaleDateString();
        copyText(discordText(rows, champ?champ.handle:null, when), b);
      };
    });
  });
}

/* ---------- mount ---------- */
function render(){
  document.body.classList.remove("overlay");
  listeners=[];
  var r=route();
  if(r==="bracket") renderBracket();
  else if(r==="archive") renderArchive();
  else if(r==="board") renderBoard();
  else if(r==="timer") renderTimerOverlay();
  else if(r==="versus") renderVersus();
  else if(r==="overlay") renderOverlay();
  else renderEnter();
  emit();
}
window.addEventListener("hashchange",render);
render();
startLive();
})();
