<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#040609" />
<title>PR0CESS // QUEUE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
<style>
/* PR0CESS // QUEUE — styles v2 "PRISM" (art direction: glitch chroma ref) */
:root{
  --void:#040609;         /* blue-black */
  --panel:#0A111B;
  --panel-2:#0F1826;
  --line:#182A3F;
  --text:#E6F0FA;         /* cool white */
  --dim:#6E8299;
  --dimmer:#3D4C60;
  --electric:#3FC6FF;     /* SIGNATURE: electric cyan */
  --electric-soft:#0A2434;
  --hot:#FF2E5F;          /* armed / live / hot state */
  --hot-soft:#2B0A16;
  --prism:linear-gradient(90deg,#FF2E5F,#FF7A2E,#3FC6FF 55%,#7A5CFF,#FF2E88);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--void);color:var(--text);
  font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;letter-spacing:.01em;position:relative}
/* scan lines over everything, very low key */
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.14) 2px 3px)}
body.overlay::after{background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.10) 2px 3px)}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
.wrap{max-width:760px;margin:0 auto;padding:24px 18px 80px}
.amber{color:var(--electric)} .bad{color:var(--hot)} .good{color:var(--electric)}

/* masthead with prism rule + RGB-split wordmark */
.mast{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding-bottom:14px;margin-bottom:22px;position:relative}
.mast::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;
  background:var(--prism);opacity:.85}
.brand{font-weight:800;font-size:15px;letter-spacing:.14em;text-transform:uppercase;
  text-shadow:-1.5px 0 rgba(255,46,95,.65), 1.5px 0 rgba(63,198,255,.65)}
.brand .z{color:var(--electric)}
.brand small{display:block;font-weight:400;font-size:10px;letter-spacing:.34em;color:var(--dim);
  margin-top:3px;text-shadow:none}
.statuspill{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  padding:5px 10px;border:1px solid var(--line);border-radius:2px;white-space:nowrap}
.statuspill.open{color:var(--electric);border-color:#14506b;text-shadow:0 0 8px rgba(63,198,255,.5)}
.statuspill.open::before{content:"● "}
.statuspill.closed{color:var(--hot);border-color:#5a1428;text-shadow:0 0 8px rgba(255,46,95,.5)}
.statuspill.closed::before{content:"● "}

.modenav{display:flex;gap:2px;margin-bottom:20px}
.modenav a{flex:1;text-align:center;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dim);padding:9px 4px;border:1px solid var(--line);border-radius:2px;text-decoration:none}
.modenav a.on{color:var(--void);background:var(--electric);border-color:var(--electric);font-weight:700;
  box-shadow:0 0 14px rgba(63,198,255,.35)}

.field{margin-bottom:14px}
.field label{display:block;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--dim);margin-bottom:6px}
.field label .req{color:var(--electric)}
input[type=text],input[type=url],input[type=password],textarea{
  width:100%;background:var(--panel);border:1px solid var(--line);border-radius:2px;
  color:var(--text);padding:11px 12px;font-size:13.5px}
textarea{resize:vertical;min-height:64px;line-height:1.55}
input::placeholder,textarea::placeholder{color:var(--dimmer)}
input:focus,textarea:focus{outline:none;border-color:var(--electric);
  box-shadow:0 0 0 1px var(--electric),0 0 14px rgba(63,198,255,.25)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:7px 11px;
  border:1px solid var(--line);border-radius:2px;color:var(--dim);background:var(--panel)}
.chip.on{color:var(--electric);border-color:#14506b;background:var(--electric-soft);
  box-shadow:0 0 10px rgba(63,198,255,.2)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--electric);color:var(--void);font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  font-size:13px;padding:14px;border-radius:2px;margin-top:6px;box-shadow:0 0 18px rgba(63,198,255,.3)}
.btn:active{transform:translateY(1px)}
.btn:disabled{background:var(--dimmer);color:#0d1622;cursor:not-allowed;box-shadow:none}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--dim);font-weight:700;box-shadow:none}
.btn.ghost:hover{color:var(--text);border-color:var(--dim)}

.hint{font-size:11px;color:var(--dim);line-height:1.6;margin-top:14px}
.hint b{color:var(--text);font-weight:500}

.rack{display:flex;flex-direction:column;gap:8px}
.strip{display:flex;align-items:stretch;background:var(--panel);border:1px solid var(--line);
  border-radius:3px;overflow:hidden}
.strip .num{flex:0 0 42px;display:flex;align-items:center;justify-content:center;font-weight:800;
  font-size:15px;color:var(--dim);background:var(--panel-2);border-right:1px solid var(--line)}
.strip .body{flex:1;min-width:0;padding:11px 13px}
.strip .who{font-weight:700;font-size:14px}
.strip .title{font-size:12.5px;color:var(--text);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strip .meta{font-size:10.5px;color:var(--dim);margin-top:5px;letter-spacing:.04em;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.strip .meta .tag{color:var(--electric);text-transform:uppercase;letter-spacing:.1em}
.strip .meta a{color:var(--electric);text-decoration:none}
.strip .note{font-size:11.5px;color:var(--dim);margin-top:7px;line-height:1.5;
  padding-top:7px;border-top:1px dashed var(--line)}
.strip .acts{flex:0 0 auto;display:flex;flex-direction:column;border-left:1px solid var(--line)}
.strip .acts button{flex:1;padding:0 13px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--dim);border-bottom:1px solid var(--line);min-width:78px}
.strip .acts button:last-child{border-bottom:none}
.strip .acts button:hover{color:var(--text);background:var(--panel-2)}
.strip .acts button.go:hover{color:var(--electric)}
.strip .acts button.kill:hover{color:var(--hot)}
.skiptag{color:var(--hot);font-size:10px;letter-spacing:.1em}

/* ARMED = the hot state, like the reference's red-hot cores */
.strip.live{border-color:var(--hot);background:var(--hot-soft);
  box-shadow:0 0 22px rgba(255,46,95,.18)}
.strip.live .num{background:var(--hot);color:var(--void)}
.strip.live .who{color:var(--hot);text-shadow:0 0 10px rgba(255,46,95,.5)}
.meter{height:4px;background:var(--line);border-radius:2px;margin-top:9px;overflow:hidden}
.meter i{display:block;height:100%;width:60%;background:var(--prism);
  animation:vu 1.1s ease-in-out infinite alternate}
@keyframes vu{from{width:22%}to{width:92%}}
@media (prefers-reduced-motion:reduce){
  .meter i,.ovl .mtr i{animation:none;width:70%}
  .ovl .now .h{animation:none}
}

.seclabel{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);
  margin:26px 0 11px;display:flex;align-items:center;gap:10px}
.seclabel::after{content:"";flex:1;height:1px;background:var(--line)}
.seclabel .ct{color:var(--electric)}

.dashbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
.dashbar .spacer{flex:1}
.toggle{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--dim);border:1px solid var(--line);border-radius:2px;padding:8px 11px}
.toggle b{font-weight:700}
.miniact{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);
  border:1px solid var(--line);border-radius:2px;padding:8px 11px}
.miniact:hover{color:var(--text);border-color:var(--dim)}
.miniact.danger:hover{color:var(--hot);border-color:#5a1428}

.empty{border:1px dashed var(--line);border-radius:3px;padding:30px 18px;text-align:center;
  color:var(--dim);font-size:12.5px;line-height:1.7}
.empty b{color:var(--text);font-weight:500;display:block;margin-bottom:4px;letter-spacing:.04em}
.confirm{border:1px solid var(--electric);background:var(--electric-soft);border-radius:3px;
  padding:22px;text-align:center;box-shadow:0 0 26px rgba(63,198,255,.15)}
.confirm .big{font-weight:800;font-size:22px;letter-spacing:.06em;color:var(--electric);
  text-shadow:-1.5px 0 rgba(255,46,95,.55),1.5px 0 rgba(63,198,255,.55)}
.confirm .sub{font-size:12px;color:var(--text);margin-top:8px;line-height:1.6}
.confirm .pos{font-size:48px;font-weight:800;color:var(--electric);line-height:1;margin:14px 0 6px;
  text-shadow:-2px 0 rgba(255,46,95,.6),2px 0 rgba(63,198,255,.6)}

/* ---- OVERLAY: full send ---- */
body.overlay{background:transparent}
.ovl{padding:26px}
.ovl .lab{font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:var(--electric);
  text-shadow:0 0 14px rgba(63,198,255,.7)}
.ovl .now{font-weight:800;font-size:36px;color:#fff;margin-top:6px;
  text-shadow:0 2px 18px rgba(0,0,0,.9)}
.ovl .now .h{color:#fff;display:inline-block;
  text-shadow:-3px 0 rgba(255,46,95,.9),3px 0 rgba(63,198,255,.9),0 2px 18px rgba(0,0,0,.9);
  animation:chroma 6s steps(1) infinite}
@keyframes chroma{
  0%,92%{transform:translateX(0)}
  93%{transform:translateX(-2px)}
  94%{transform:translateX(2px)}
  95%,100%{transform:translateX(0)}
}
.ovl .trk{font-size:18px;color:#fff;margin-top:4px;opacity:.92;text-shadow:0 2px 14px rgba(0,0,0,.9)}
.ovl .mtr{height:6px;width:340px;max-width:80vw;background:rgba(255,255,255,.12);
  border-radius:3px;margin-top:16px;overflow:hidden}
.ovl .mtr i{display:block;height:100%;width:70%;background:var(--prism);
  box-shadow:0 0 18px rgba(63,198,255,.7);animation:vu 1.05s ease-in-out infinite alternate}
.ovl .next{margin-top:18px;font-size:14px;letter-spacing:.06em;color:#fff;opacity:.85;
  text-shadow:0 2px 12px rgba(0,0,0,.9)}
.ovl .next b{color:var(--electric);font-weight:700}

.gate{max-width:420px;margin:60px auto;text-align:center}
.gate .g-brand{font-weight:800;font-size:18px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:6px;
  text-shadow:-1.5px 0 rgba(255,46,95,.65),1.5px 0 rgba(63,198,255,.65)}
.gate .g-brand .z{color:var(--electric)}
.gate p{color:var(--dim);font-size:12px;line-height:1.7;margin:10px 0 22px}
.gate .err{color:var(--hot);font-size:11.5px;margin-top:14px}

.foot{margin-top:40px;padding-top:14px;border-top:1px solid var(--line);font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* =========================================================
   THE ONLY PART YOU EDIT — your two Supabase values.
   Supabase > your project > Settings > API
   ========================================================= */
window.PQ_CONFIG = {
  SUPABASE_URL:      "https://tewcgwhumtmjvfxcvbxl.supabase.co/rest/v1/",     // like https://abcdxyz.supabase.co
  SUPABASE_ANON_KEY: "sb_publishable_1DZr_3nrtELGlEFIR3SIMA_F_ELXSdn", // the long "anon public" key

  BRAND:      "PR0CESS",
  BRAND_TAIL: "QUEUE",
  BRAND_SUB:  "PR0CESS_LIVE // FEEDBACK STREAMS",
  GENRES: ["Tearout","Midtempo","Experimental","Hybrid Trap","Riddim","Other"]
};

</script>
<script>
/* PR0CESS // QUEUE — Supabase edition. Edit config.js, not this file. */
(function(){
"use strict";

var CFG = window.PQ_CONFIG || {};
var BRAND=CFG.BRAND||"PR0CESS", BRAND_TAIL=CFG.BRAND_TAIL||"QUEUE", BRAND_SUB=CFG.BRAND_SUB||"";
var GENRES=CFG.GENRES||["Other"];
var CONFIGURED = CFG.SUPABASE_URL && CFG.SUPABASE_URL.indexOf("PASTE")!==0 && window.supabase;
var sb = CONFIGURED ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY) : null;

var app=document.getElementById("app");
function esc(s){return (s||"").replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function route(){return location.hash.replace("#","").split("?")[0]||"submit";}
function wordmark(){ return BRAND.replace("0",'<span class="z">0</span>')+' <span class="z">//</span> '+BRAND_TAIL; }

/* ---------------- state ---------------- */
var State={open:true,items:[]};
var listeners=[]; var pollT=null;
function onState(fn){listeners.push(fn);fn();}
function emit(){listeners.forEach(function(fn){fn();});}
function current(){return State.items.filter(function(i){return i.status==="reviewing";})[0]||null;}
function queued(){return State.items.filter(function(i){return i.status==="queued";}).sort(function(a,b){return a.sort_key-b.sort_key;});}
function reviewed(){return State.items.filter(function(i){return i.status==="done"||i.status==="skipped";});}

function refresh(){
  if(!sb) return Promise.resolve();
  return Promise.all([
    sb.from("queue").select("*"),
    sb.from("session").select("open").eq("id",1).single()
  ]).then(function(res){
    if(!res[0].error) State.items=res[0].data||[];
    if(!res[1].error && res[1].data) State.open=!!res[1].data.open;
    emit();
  });
}
function startLive(){
  if(!sb) return;
  refresh();
  try{
    sb.channel("pq")
      .on("postgres_changes",{event:"*",schema:"public",table:"queue"},refresh)
      .on("postgres_changes",{event:"*",schema:"public",table:"session"},refresh)
      .subscribe();
  }catch(e){}
  clearInterval(pollT); pollT=setInterval(refresh, 7000); // safety net if realtime hiccups
}

/* ---------------- admin (PIN) ---------------- */
var PIN = localStorage.getItem("pq_pin")||"";
function verifyPin(pin){ return sb.rpc("pq_verify_pin",{p_pin:pin}).then(function(r){return !r.error && r.data===true;}); }
function admin(cmd,id){
  return sb.rpc("pq_admin",{p_pin:PIN,p_cmd:cmd,p_id:id||null}).then(function(r){
    if(r.error){
      if(/bad pin/i.test(r.error.message)){ PIN=""; localStorage.removeItem("pq_pin"); render(); }
      else alert("Action failed: "+r.error.message);
    }
    return refresh();
  });
}

/* ---------------- shared UI ---------------- */
function nav(active){
  function link(h,l){return '<a href="#'+h+'" class="'+(active===h?'on':'')+'">'+l+'</a>';}
  return '<div class="modenav">'+link('submit','Submit')+link('queue','Dashboard')+link('overlay','OBS Overlay')+'</div>';
}
function pill(){
  if(!CONFIGURED) return '<span class="statuspill closed">not connected</span>';
  var cls=State.open?"open":"closed";
  return '<span class="statuspill '+cls+'">'+(State.open?"Open":"Closed")+' · '+queued().length+' waiting</span>';
}
function stripView(it,n,kind,acts){
  var cls=kind==="live"?"strip live":"strip";
  var style=it.status==="skipped"?' style="opacity:.55"':(kind==="done"?' style="opacity:.7"':'');
  return '<div class="'+cls+'"'+style+'><div class="num">'+n+'</div><div class="body">'+
    '<div class="who">'+esc(it.handle)+(it.status==="skipped"?' <span class="skiptag">SKIPPED</span>':'')+'</div>'+
    '<div class="title">'+esc(it.title)+'</div>'+
    '<div class="meta">'+(it.genre?'<span class="tag">'+esc(it.genre)+'</span>':'')+
      '<a href="'+esc(it.link)+'" target="_blank" rel="noopener">open link ↗</a></div>'+
    (it.note?'<div class="note">'+esc(it.note)+'</div>':'')+
    (kind==="live"?'<div class="meter"><i></i></div>':'')+
  '</div>'+(acts?'<div class="acts">'+acts+'</div>':'')+'</div>';
}
function notConfigured(){
  app.innerHTML='<div class="wrap"><div class="gate"><div class="g-brand">'+wordmark()+'</div>'+
  '<p>Not connected yet. Open <b>config.js</b> and paste your Supabase URL and anon key (Settings → API), then reload.</p></div></div>';
}

/* ---------------- SUBMIT ---------------- */
function renderSubmit(){
  if(!CONFIGURED){ notConfigured(); return; }
  app.innerHTML='<div class="wrap">'+
    '<div class="mast"><div class="brand">'+wordmark()+'<small>'+esc(BRAND_SUB)+'</small></div><span id="pill"></span></div>'+
    nav('submit')+'<div id="formzone"></div>'+
    '<div class="foot"><span>v1.2.0</span><span>'+wordmark()+'</span></div></div>';
  var built=false;
  onState(function(){
    var p=document.getElementById("pill"); if(p) p.innerHTML=pill();
    var fz=document.getElementById("formzone"); if(!fz) return;
    if(!State.open){ built=false;
      fz.innerHTML='<div class="empty"><b>The queue is closed right now.</b>G-REX isn\'t taking submissions at the moment. Catch the next feedback stream on PR0CESS_LIVE.</div>';
      return; }
    if(built) return; built=true;
    buildForm(fz);
  });
}
function buildForm(fz){
  var genre="";
  fz.innerHTML=
    '<div class="field"><label>Producer / handle <span class="req">*</span></label><input id="f-handle" type="text" maxlength="40" placeholder="@yourhandle" autocomplete="off"></div>'+
    '<div class="field"><label>Track title <span class="req">*</span></label><input id="f-title" type="text" maxlength="80" placeholder="what\'s it called"></div>'+
    '<div class="field"><label>Link <span class="req">*</span></label><input id="f-link" type="url" placeholder="SoundCloud or Dropbox link that plays"></div>'+
    '<div class="field"><label>Genre</label><div class="chips" id="f-genre">'+GENRES.map(function(g){return '<button type="button" class="chip" data-g="'+esc(g)+'">'+esc(g)+'</button>';}).join("")+'</div></div>'+
    '<div class="field"><label>What do you want feedback on?</label><textarea id="f-note" maxlength="240" placeholder="optional — point him at the part you\'re unsure about"></textarea></div>'+
    '<button class="btn" id="f-send">Send to queue</button>'+
    '<div class="hint" id="f-err"></div>'+
    '<div class="hint"><b>How to link your track:</b> SoundCloud — upload it (private is fine) and paste the share link. Dropbox — upload the file and hit Copy Link. Test your link in an incognito tab: if it plays there, it plays for G-REX.<br><br><b>House rules:</b> one track per handle while you\'re in line. Heavy, weird, unfinished — all welcome.</div>';

  fz.querySelectorAll("#f-genre .chip").forEach(function(c){ c.onclick=function(){
    fz.querySelectorAll("#f-genre .chip").forEach(function(x){x.classList.remove("on");});
    c.classList.add("on"); genre=c.getAttribute("data-g");
  };});

  document.getElementById("f-send").onclick=function(){
    var handle=document.getElementById("f-handle").value.trim();
    var title=document.getElementById("f-title").value.trim();
    var link=document.getElementById("f-link").value.trim();
    var note=document.getElementById("f-note").value.trim();
    var err=document.getElementById("f-err");
    if(!/^https?:\/\//i.test(link) && /^(www\.|soundcloud\.|dropbox\.)/i.test(link)) link="https://"+link;
    if(!handle||!title){ err.innerHTML='<b class="bad">Need a handle and a title.</b>'; return; }
    if(!/^https?:\/\//i.test(link)){ err.innerHTML='<b class="bad">Paste the full link — it should start with http(s)://</b>'; return; }
    var btn=document.getElementById("f-send"); btn.disabled=true; btn.textContent="Sending…";

    sb.from("queue").insert({handle:handle,title:title,link:link,note:note||null,genre:genre||null})
    .then(function(r){
      if(r.error) throw r.error;
      return sb.from("queue").select("id",{count:"exact",head:true}).eq("status","queued");
    }).then(function(r){
      var pos=r.count||1;
      fz.innerHTML='<div class="confirm"><div class="big">You\'re in.</div><div class="pos">#'+pos+'</div>'+
        '<div class="sub"><b class="amber">'+esc(handle)+'</b> — "'+esc(title)+'"<br>Position in queue. Keep the stream open — G-REX pulls from the top.</div>'+
        '<button class="btn ghost" style="margin-top:18px" onclick="location.reload()">Done</button></div>';
    }).catch(function(e){
      btn.disabled=false; btn.textContent="Send to queue";
      var m=(e&&e.message)||"";
      if(/one_active_per_handle|duplicate key/i.test(m)) err.innerHTML='<b class="bad">That handle already has a track in line — one at a time.</b>';
      else if(/row-level|policy|violates/i.test(m)) err.innerHTML='<b class="bad">Submissions just closed.</b>';
      else err.innerHTML='<b class="bad">Couldn\'t send — try again in a second.</b>';
    });
  };
}

/* ---------------- DASHBOARD ---------------- */
function renderDashboard(){
  if(!CONFIGURED){ notConfigured(); return; }
  if(!PIN){ renderPinGate(); return; }
  app.innerHTML='<div class="wrap">'+
    '<div class="mast"><div class="brand">'+wordmark()+'<small>DASHBOARD</small></div><span id="pill"></span></div>'+
    nav('queue')+
    '<div class="dashbar"><button class="toggle" id="d-toggle"></button><div class="spacer"></div>'+
    '<button class="miniact" id="d-clear">Clear reviewed</button>'+
    '<button class="miniact danger" id="d-lock">Lock</button></div>'+
    '<div id="d-now"></div>'+
    '<div class="seclabel">Up next <span class="ct" id="d-upct"></span></div>'+
    '<div id="d-queue" class="rack"></div>'+
    '<div class="seclabel">Reviewed</div>'+
    '<div id="d-done" class="rack"></div>'+
    '<div class="foot"><span>v1.2.0</span><span>LIVE</span></div></div>';
  document.getElementById("d-clear").onclick=function(){ admin("clear_reviewed"); };
  document.getElementById("d-lock").onclick=function(){ PIN=""; localStorage.removeItem("pq_pin"); render(); };
  onState(function(){
    var p=document.getElementById("pill"); if(p) p.innerHTML=pill();
    var dt=document.getElementById("d-toggle");
    if(dt){ dt.innerHTML='Submissions: <b class="'+(State.open?'amber':'bad')+'">'+(State.open?'OPEN':'CLOSED')+'</b> · tap to '+(State.open?'close':'open');
      dt.onclick=function(){ admin(State.open?"close":"open"); }; }
    var c=current(), list=queued(), done=reviewed();
    var upct=document.getElementById("d-upct"); if(upct) upct.textContent=list.length;
    var now=document.getElementById("d-now"); if(!now) return;
    now.innerHTML = c ? stripView(c,"▸","live",'<button class="go" data-a="done" data-id="'+c.id+'">Done</button>')
      : '<div class="empty"><b>Nothing armed.</b>Hit Review on a strip below to put it on the overlay.</div>';
    document.getElementById("d-queue").innerHTML = list.length ?
      list.map(function(it,i){return stripView(it,i+1,"plain",
        '<button class="go" data-a="review" data-id="'+it.id+'">Review</button>'+
        '<button data-a="bump" data-id="'+it.id+'">Bump ↑</button>'+
        '<button data-a="skip" data-id="'+it.id+'">Skip</button>'+
        '<button class="kill" data-a="delete" data-id="'+it.id+'">✕</button>');}).join("")
      : '<div class="empty">'+(State.open?"Queue's empty — waiting on submissions.":"Closed and empty.")+'</div>';
    document.getElementById("d-done").innerHTML = done.length ?
      done.slice().reverse().map(function(it){return stripView(it,"·","done",
        '<button data-a="requeue" data-id="'+it.id+'">Re-queue</button>'+
        '<button class="kill" data-a="delete" data-id="'+it.id+'">✕</button>');}).join("")
      : '<div class="empty" style="padding:18px">Nothing reviewed yet this session.</div>';
    app.querySelectorAll("[data-a]").forEach(function(b){ b.onclick=function(){ admin(b.getAttribute("data-a"), b.getAttribute("data-id")); }; });
  });
}
function renderPinGate(){
  app.innerHTML='<div class="wrap"><div class="gate"><div class="g-brand">'+wordmark()+'</div>'+
    '<p>Dashboard is crew-only. Enter the PIN (it was printed when you ran setup.sql).</p>'+
    '<input id="pin" type="password" placeholder="PIN" style="text-align:center;max-width:260px;margin:0 auto;display:block">'+
    '<button class="btn" id="unlock" style="max-width:260px;margin:14px auto 0">Unlock</button>'+
    '<div class="err" id="g-err"></div></div></div>';
  function go(){
    var v=document.getElementById("pin").value.trim();
    verifyPin(v).then(function(ok){
      if(ok){ PIN=v; localStorage.setItem("pq_pin",v); render(); }
      else document.getElementById("g-err").textContent="Wrong PIN.";
    });
  }
  document.getElementById("unlock").onclick=go;
  document.getElementById("pin").onkeydown=function(e){ if(e.key==="Enter") go(); };
}

/* ---------------- OVERLAY ---------------- */
function renderOverlay(){
  if(!CONFIGURED){ notConfigured(); return; }
  document.body.classList.add("overlay");
  app.innerHTML='<div class="ovl" id="ovl"></div>';
  onState(function(){
    var c=current(), list=queued(), next=list[0], o=document.getElementById("ovl"); if(!o) return;
    if(!c){
      o.innerHTML='<div class="lab">'+BRAND+' // '+BRAND_TAIL+'</div>'+
        '<div class="now">'+(list.length?(list.length+" in the queue"):"queue is open")+'</div>'+
        (next?'<div class="next">UP NEXT &nbsp; <b>'+esc(next.handle)+'</b></div>':''); return;
    }
    o.innerHTML='<div class="lab">Now reviewing</div>'+
      '<div class="now"><span class="h">'+esc(c.handle)+'</span></div>'+
      '<div class="trk">"'+esc(c.title)+'"'+(c.genre?(' · '+esc(c.genre)):'')+'</div>'+
      '<div class="mtr"><i></i></div>'+
      (next?'<div class="next">UP NEXT &nbsp; <b>'+esc(next.handle)+'</b> &nbsp;·&nbsp; '+list.length+' waiting</div>'
           :'<div class="next">'+list.length+' waiting</div>');
  });
}

/* ---------------- mount ---------------- */
function render(){
  document.body.classList.remove("overlay");
  listeners=[];
  var r=route();
  if(r==="queue") renderDashboard();
  else if(r==="overlay") renderOverlay();
  else renderSubmit();
  emit();
}
window.addEventListener("hashchange",render);
render();
startLive();

})();

</script>
</body>
</html>
